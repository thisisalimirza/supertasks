<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B47E0"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <rect width="1024" height="512" rx="230" ry="230" fill="url(#shine)"/>

  <!-- Three task lines with checkmarks -->
  <!-- Line 1 - checked -->
  <circle cx="310" cy="360" r="44" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="36"/>
  <polyline points="289,360 306,378 334,344" fill="none" stroke="white" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="400" y="338" width="320" height="44" rx="22" fill="rgba(255,255,255,0.35)"/>

  <!-- Line 2 - checked -->
  <circle cx="310" cy="512" r="44" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="36"/>
  <polyline points="289,512 306,530 334,496" fill="none" stroke="white" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="400" y="490" width="260" height="44" rx="22" fill="rgba(255,255,255,0.35)"/>

  <!-- Line 3 - unchecked (accent) -->
  <circle cx="310" cy="664" r="44" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="36"/>
  <rect x="400" y="642" width="200" height="44" rx="22" fill="rgba(255,255,255,0.2)"/>

  <!-- Lightning bolt accent on line 3 -->
  <polygon points="590,620 558,672 582,672 550,724 614,660 588,660" fill="rgba(255,255,255,0.7)"/>
</svg>
